<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KoLCWO - 한글 모스부호 학습기</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #ffffff; color: #000; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; border: 2px solid #000; padding: 20px; }
        .controls, .settings-panel { margin-bottom: 20px; padding: 15px; border: 1px solid #000; }
        .control-group { margin-bottom: 10px; }
        label { font-weight: bold; }
        textarea { width: 100%; height: 100px; margin-top: 10px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px; width: 100%; font-weight: bold; }
        .settings-panel div { display: flex; align-items: center; margin-bottom: 8px; }
        .settings-panel label { width: 140px; }
        .settings-panel input { flex-grow: 1; margin: 0 15px; }
        .settings-panel span { width: 40px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>KoLCWO</h1>
    <div class="controls">
        <div class="control-group">
            <label>레슨 (Koch Level)</label>
            <select id="lessonSelect">
                <script>
                    const levels = ["ㅏ, ㅓ","ㄱ","ㄴ","ㅗ","ㅜ","ㄷ","ㄹ","ㅣ","ㅡ","ㅁ","ㅂ","ㅅ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ","ㅑ","ㅕ","ㅛ","ㅠ","ㅐ","ㅔ"];
                    levels.forEach((chars, i) => {
                        document.write(`<option value="${i+1}">L${i+1}: ${i===0?'':' + '}${chars}</option>`);
                    });
                </script>
            </select>
        </div>
        <div class="control-group">
            <label>시간 (Time)</label>
            <select id="timeInput"><option value="1">1분</option><option value="2">2분</option><option value="3">3분</option></select>
        </div>
    </div>

    <div class="settings-panel">
        <div><label>Speed (WPM)</label><input type="range" id="charWpmInput" value="25" min="10" max="50"> <span id="charWpmLabel">25</span></div>
        <div><label>Eff. Speed (WPM)</label><input type="range" id="effWpmInput" value="15" min="5" max="50"> <span id="effWpmLabel">15</span></div>
        <div><label>Freq (Hz)</label><input type="range" id="freqInput" value="650" min="400" max="1000"> <span id="freqLabel">650</span></div>
        <div><label>Volume (%)</label><input type="range" id="volInput" value="100" min="0" max="100"> <span id="volLabel">100</span></div>
    </div>

    <button id="startBtn">연습 시작</button>
    <textarea id="userInput" placeholder="소리를 듣고 입력하세요..." disabled></textarea>
    <button id="checkBtn" disabled>결과 확인</button>

    <div class="status-bar" style="margin-top:20px;">
        <span id="statusText">대기 중...</span> | <span id="scoreText">정답률: -%</span>
    </div>

    <table id="statsTable" style="width: 100%; margin-top: 20px; text-align: center; border-collapse: collapse;">
        <thead><tr style="border-bottom: 2px solid #000;"><th>레슨</th><th>속도</th><th>정답률</th><th>날짜</th></tr></thead>
        <tbody id="statsBody"></tbody>
    </table>
</div>

<script>
    const MORSE_KOR = {'ㄱ':'.-..','ㄴ':'..-.','ㄷ':'-...','ㄹ':'---','ㅁ':'--','ㅂ':'.--','ㅅ':'--.','ㅇ':'-.-','ㅈ':'.--.','ㅊ':'-.-.','ㅋ':'-..-','ㅌ':'--..','ㅍ':'---.','ㅎ':'.---','ㅏ':'.','ㅑ':'..','ㅓ':'-','ㅕ':'...','ㅗ':'.-','ㅛ':'-.','ㅜ':'----','ㅠ':'.-.','ㅡ':'-..','ㅣ':'..-','ㅐ':'--.-','ㅔ':'-.--'};
    const kochSequence = ['ㅏ','ㅓ','ㄱ','ㄴ','ㅗ','ㅜ','ㄷ','ㄹ','ㅣ','ㅡ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','ㅑ','ㅕ','ㅛ','ㅠ','ㅐ','ㅔ'];
    
    // 버그 수정 2: 슬라이더 수치 실시간 업데이트 로직
    const updateLabel = (id) => {
        document.getElementById(id + 'Label').innerText = document.getElementById(id + 'Input').value;
    };
    ['charWpm', 'effWpm', 'freq', 'vol'].forEach(id => {
        document.getElementById(id + 'Input').addEventListener('input', (e) => {
            updateLabel(id);
            // 유효 속도가 문자 속도를 넘지 못하도록 제한
            if(id === 'charWpm' && parseInt(document.getElementById('effWpmInput').value) > parseInt(e.target.value)) {
                document.getElementById('effWpmInput').value = e.target.value;
                updateLabel('effWpm');
            }
        });
    });

    let audioCtx;
    
    // 버그 수정 3: 수학적으로 엄격하게 분리된 파른스워스 타이밍 로직
    function playSequence(text, charWpm, effWpm, freq, vol) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const charDot = 1.2 / charWpm;      // 부호 자체의 속도
        const spaceDot = 1.2 / effWpm;      // 띄어쓰기의 속도 (파른스워스)
        const edge = 0.005;                 // 파핑 노이즈 방지 곡선
        
        let time = audioCtx.currentTime + 0.1;
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; 
        osc.frequency.value = freq;
        osc.connect(gain); 
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);

        for (let char of text) {
            if (char === ' ') { 
                // 단어 간 간격: 앞서 글자 끝에서 3이 더해졌으므로 4만 더해 총 7 유지
                time += spaceDot * 4; 
                continue; 
            }
            
            const morse = MORSE_KOR[char];
            if (!morse) continue;
            
            for (let k = 0; k < morse.length; k++) {
                const s = morse[k];
                const dur = (s === '.') ? charDot : charDot * 3;
                
                // 소리 ON (볼륨 적용)
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + edge);
                gain.gain.setValueAtTime(vol, time + dur - edge);
                gain.gain.linearRampToValueAtTime(0, time + dur);
                
                time += dur;
                
                // 글자 '내부'의 부호 간 간격 (1단점, 문자 속도 기준)
                if (k < morse.length - 1) {
                    time += charDot;
                }
            }
            // 글자와 글자 '사이'의 간격 (3단점, 유효 속도 기준)
            time += spaceDot * 3;
        }
        osc.start(audioCtx.currentTime); 
        osc.stop(time);
        return (time - audioCtx.currentTime) * 1000;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        const level = document.getElementById('lessonSelect').value;
        const wpm = parseInt(document.getElementById('charWpmInput').value);
        const eff = parseInt(document.getElementById('effWpmInput').value);
        const freq = parseInt(document.getElementById('freqInput').value);
        const vol = parseInt(document.getElementById('volInput').value) / 100; // 볼륨 값 가져오기
        
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('statusText');
        const userInput = document.getElementById('userInput');
        
        btn.disabled = true;
        userInput.disabled = true;
        userInput.value = "";
        
        // 1. 신규 글자 프리뷰
        const newChars = level == 1 ? ['ㅏ', 'ㅓ'] : [kochSequence[level - 1]];
        status.innerText = `프리뷰 재생 중: ${newChars.join(', ')}`;
        
        const previewText = newChars.join(" ") + " " + newChars.join(" ");
        const previewDuration = playSequence(previewText, wpm, wpm, freq, vol);

        // 2. 문제 생성 및 재생
        setTimeout(() => {
            const groups = eff * parseInt(document.getElementById('timeInput').value);
            const allowedCount = parseInt(level) + 1; 
            
            let problem = [];
            for(let i=0; i<groups; i++) {
                let g=""; 
                for(let j=0; j<5; j++) {
                    g += kochSequence[Math.floor(Math.random() * allowedCount)];
                }
                problem.push(g);
            }
            window.currentProblem = problem.join(" ");
            
            status.innerText = "연습 문제 재생 중...";
            const duration = playSequence(window.currentProblem, wpm, eff, freq, vol);
            
            setTimeout(() => {
                status.innerText = "수신 완료. 채점 버튼을 누르세요.";
                btn.disabled = false;
                userInput.disabled = false;
                document.getElementById('checkBtn').disabled = false;
                userInput.focus();
            }, duration);
            
        }, previewDuration + 1000);
    });

    document.getElementById('checkBtn').addEventListener('click', () => {
        const user = document.getElementById('userInput').value.replace(/\s/g, "");
        const ans = window.currentProblem.replace(/\s/g, "");
        let correct = 0;
        for(let i=0; i<ans.length; i++) if(user[i] === ans[i]) correct++;
        
        const acc = ans.length > 0 ? Math.floor((correct/ans.length)*100) : 0;
        document.getElementById('scoreText').innerText = `정답률: ${acc}%`;
        document.getElementById('statusText').innerText = "채점 완료";
        
        // localStorage에 저장
        let history = JSON.parse(localStorage.getItem('cwHistory') || '[]');
        history.unshift({lesson: document.getElementById('lessonSelect').value, speed: document.getElementById('charWpmInput').value, acc, date: new Date().toLocaleString()});
        localStorage.setItem('cwHistory', JSON.stringify(history.slice(0,10)));
        renderTable();
        
        document.getElementById('userInput').disabled = true;
        document.getElementById('checkBtn').disabled = true;
    });

    function renderTable() {
        const body = document.getElementById('statsBody');
        body.innerHTML = JSON.parse(localStorage.getItem('cwHistory')||'[]').map(r => `<tr style="border-bottom: 1px solid #eee;"><td>L${r.lesson}</td><td>${r.speed} WPM</td><td><strong style="color:${r.acc >= 90 ? 'green' : 'red'};">${r.acc}%</strong></td><td style="font-size:12px; color:#666;">${r.date}</td></tr>`).join('');
    }
    renderTable();
</script>

</body>
</html>
