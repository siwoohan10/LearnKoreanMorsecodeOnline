<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LKMO - 한글 모스부호 학습기</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f1ea;
            --surface: #ffffff;
            --surface-2: #f3efe7;
            --text: #171717;
            --muted: #5b5b5b;
            --border: #1f1f1f;
            --accent: #1f5eff;
            --accent-strong: #1747bf;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg: #0f1115;
            --surface: #161a22;
            --surface-2: #1b2030;
            --text: #eceff4;
            --muted: #a8b0c0;
            --border: #4a5568;
            --accent: #79a6ff;
            --accent-strong: #9cbcff;
            --shadow: rgba(0, 0, 0, 0.35);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .container {
            width: 100%;
            max-width: 600px;
            border: 2px solid var(--border);
            padding: 20px;
            background: var(--surface);
            box-shadow: 0 10px 30px var(--shadow);
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .controls, .settings-panel {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid var(--border);
            background: var(--surface-2);
        }

        .control-group { margin-bottom: 10px; }
        label { font-weight: bold; color: var(--text); }
        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
            box-sizing: border-box;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        button {
            cursor: pointer;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
        }
        button:hover { border-color: var(--accent); }
        button:focus-visible, select:focus-visible, textarea:focus-visible, input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        select, input[type="range"] {
            accent-color: var(--accent);
        }
        select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .status-bar, table {
            color: var(--text);
        }
        table {
            border-collapse: collapse;
            background: var(--surface);
        }
        th, td {
            border-bottom: 1px solid var(--border);
            padding: 8px;
        }
        th { background: var(--surface-2); }
    </style>
</head>
<body>

<div class="container">
    <h1>LKMO</h1>
    <div class="controls">
        <div class="control-group">
            <label>레슨 (Koch Level)</label>
            <select id="lessonSelect">
                <script>
                    const levels = ["ㅏ, ㅓ","ㄱ","ㄴ","ㅗ","ㅜ","ㄷ","ㄹ","ㅣ","ㅡ","ㅁ","ㅂ","ㅅ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ","ㅑ","ㅕ","ㅛ","ㅠ","ㅐ","ㅔ"];
                    levels.forEach((chars, i) => {
                        document.write(`<option value="${i+1}">L${i+1}: ${i===0?'':' + '}${chars}</option>`);
                    });
                </script>
            </select>
        </div>
        <div class="control-group">
            <label>시간 (Time)</label>
            <select id="timeInput"><option value="1">1분</option><option value="2">2분</option><option value="3">3분</option></select>
        </div>
    </div>

    <div class="settings-panel">
        <div><label>Speed (WPM)</label><input type="range" id="charWpmInput" value="25" min="10" max="50"> <span id="charWpmLabel">25</span></div>
        <div><label>Eff. Speed (WPM)</label><input type="range" id="effWpmInput" value="15" min="5" max="50"> <span id="effWpmLabel">15</span></div>
        <div><label>Freq (Hz)</label><input type="range" id="freqInput" value="650" min="400" max="1000"> <span id="freqLabel">650</span></div>
    </div>

    <button id="startBtn">연습 시작</button>
    <textarea id="userInput" placeholder="소리를 듣고 입력하세요..." disabled></textarea>
    <button id="checkBtn" disabled>결과 확인</button>

    <div class="status-bar" style="margin-top:20px;">
        <span id="statusText">대기 중...</span> | <span id="scoreText">정답률: -%</span>
    </div>

    <table id="statsTable" style="width: 100%; margin-top: 20px;">
        <thead><tr><th>레슨</th><th>속도</th><th>정답률</th><th>날짜</th></tr></thead>
        <tbody id="statsBody"></tbody>
    </table>
</div>

<script>
    const MORSE_KOR = {'ㄱ':'.-..','ㄴ':'..-.','ㄷ':'-...','ㄹ':'---','ㅁ':'--','ㅂ':'.--','ㅅ':'--.','ㅇ':'-.-','ㅈ':'.--.','ㅊ':'-.-.','ㅋ':'-..-','ㅌ':'--..','ㅍ':'---.','ㅎ':'.---','ㅏ':'.','ㅑ':'..','ㅓ':'-','ㅕ':'...','ㅗ':'.-','ㅛ':'-.','ㅜ':'----','ㅠ':'.-.','ㅡ':'-..','ㅣ':'..-','ㅐ':'--.-','ㅔ':'-.--'};
    const kochSequence = ['ㅏ','ㅓ','ㄱ','ㄴ','ㅗ','ㅜ','ㄷ','ㄹ','ㅣ','ㅡ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','ㅑ','ㅕ','ㅛ','ㅠ','ㅐ','ㅔ'];

    function applySystemTheme() {
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    }

    applySystemTheme();
    if (window.matchMedia) {
        const colorSchemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const handleThemeChange = () => applySystemTheme();
        if (typeof colorSchemeQuery.addEventListener === 'function') {
            colorSchemeQuery.addEventListener('change', handleThemeChange);
        } else if (typeof colorSchemeQuery.addListener === 'function') {
            colorSchemeQuery.addListener(handleThemeChange);
        }
    }
    
    // UI 업데이트 및 오디오 설정 생략 (동작 확인을 위한 핵심 로직만 기술)
    let audioCtx;
    function playSequence(text, charWpm, effWpm, freq, vol) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const charDot = 1.2 / charWpm, spaceDot = 1.2 / effWpm, edge = 0.005;
        let time = audioCtx.currentTime + 0.1;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);

        for (let char of text) {
            if (char === ' ') { time += spaceDot * 4; continue; }
            const morse = MORSE_KOR[char];
            if (!morse) continue;
            for (let s of morse) {
                const dur = (s === '.') ? charDot : charDot * 3;
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + edge);
                gain.gain.setValueAtTime(vol, time + dur - edge);
                gain.gain.linearRampToValueAtTime(0, time + dur);
                time += dur + charDot;
            }
            time += (spaceDot * 3) - charDot;
        }
        osc.start(); osc.stop(time);
        return (time - audioCtx.currentTime) * 1000;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        const level = document.getElementById('lessonSelect').value;
        const wpm = parseInt(document.getElementById('charWpmInput').value);
        const eff = parseInt(document.getElementById('effWpmInput').value);
        const freq = parseInt(document.getElementById('freqInput').value);
        
        // 1. 신규 글자 프리뷰
        const newChars = level == 1 ? ['ㅏ', 'ㅓ'] : [kochSequence[level - 1]];
        alert(`이번 레벨 신규 글자: ${newChars.join(', ')}`);
        playSequence(newChars.join(" "), wpm, wpm, freq, 0.5);

        // 2. 문제 생성 및 재생
        setTimeout(() => {
            const groups = eff * parseInt(document.getElementById('timeInput').value);
            let problem = [];
            const allowedCount = parseInt(level) + 1; 

        for(let i = 0; i < groups; i++) {
            let g = ""; 
            for(let j = 0; j < 5; j++) {
                // 0부터 allowedCount-1까지의 정수 인덱스를 무작위로 뽑습니다.
                const randomIndex = Math.floor(Math.random() * allowedCount);
                g += kochSequence[randomIndex];
            }
            problem.push(g);
        }
            window.currentProblem = problem.join(" ");
            const duration = playSequence(window.currentProblem, wpm, eff, freq, 0.5);
            document.getElementById('userInput').disabled = false;
        }, 2000);
    });

    document.getElementById('checkBtn').addEventListener('click', () => {
        const user = document.getElementById('userInput').value.replace(/\s/g, "");
        const ans = window.currentProblem.replace(/\s/g, "");
        let correct = 0;
        for(let i=0; i<ans.length; i++) if(user[i] === ans[i]) correct++;
        const acc = Math.floor((correct/ans.length)*100);
        document.getElementById('scoreText').innerText = `정답률: ${acc}%`;
        
        // localStorage에 저장
        let history = JSON.parse(localStorage.getItem('cwHistory') || '[]');
        history.unshift({lesson: document.getElementById('lessonSelect').value, acc, date: new Date().toLocaleDateString()});
        localStorage.setItem('cwHistory', JSON.stringify(history.slice(0,10)));
        renderTable();
    });

    function renderTable() {
        const body = document.getElementById('statsBody');
        body.innerHTML = JSON.parse(localStorage.getItem('cwHistory')||'[]').map(r => `<tr><td>L${r.lesson}</td><td>${r.acc}%</td><td>${r.date}</td></tr>`).join('');
    }
    renderTable();
</script>

</body>
</html>
